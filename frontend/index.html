<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="ledger">
    <header class="ledger__header">
      <h1 class="ledger__title">TO-DO</h1>
      <span id="count" class="ledger__count">0 open</span>
    </header>

    <form id="add-form" class="ledger__add" novalidate>
      <input id="add-input" class="ledger__input" type="text" placeholder="+ add a task..." maxlength="500" autocomplete="off" />
      <button type="submit" class="ledger__add-btn">Add</button>
    </form>
    <p id="add-error" class="ledger__error" hidden></p>

    <nav class="ledger__filters" id="filters">
      <button class="filter-tab is-active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="active">Active</button>
      <button class="filter-tab" data-filter="completed">Completed</button>
    </nav>

    <ul id="list" class="ledger__list"></ul>

    <p id="empty" class="ledger__empty" hidden>Nothing here yet.</p>

    <button id="clear-completed" class="ledger__clear" hidden>Clear completed</button>
  </main>

  <div id="toast" class="toast" hidden>
    <span id="toast-message"></span>
    <button id="toast-undo">Undo</button>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
