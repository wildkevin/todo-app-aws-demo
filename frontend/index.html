<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do App — Infra Check</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 480px; margin: 3rem auto; padding: 0 1rem; }
    pre { background: #f4f5f7; padding: 1rem; border-radius: 8px; overflow-x: auto; }
    .error { color: #991b1b; }
  </style>
</head>
<body>
  <h1>Infra check</h1>
  <p>This page is served from S3. Clicking the button calls the Lambda Function URL, which reads/writes DynamoDB.</p>
  <button id="ping">Call Lambda</button>
  <pre id="result">(not called yet)</pre>

  <script src="config.js"></script>
  <script>
    document.getElementById("ping").addEventListener("click", async () => {
      const resultEl = document.getElementById("result");
      resultEl.textContent = "Calling...";
      resultEl.className = "";
      try {
        const res = await fetch(window.API_BASE_URL);
        const data = await res.json();
        resultEl.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        resultEl.textContent = "Request failed: " + err.message;
        resultEl.className = "error";
      }
    });
  </script>
</body>
</html>
